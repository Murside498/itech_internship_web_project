<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Kayıt Ol</title>
  <link rel="stylesheet" href="giris_kayit.css">
</head>
<body>
  <div class="form-container">
    <h2>Kayıt Ol</h2>
    <form action="/kayit" method="POST">
      <div class="form-group">
        <label for="kullaniciAdi">Kullanıcı Adı</label>
        <input type="text" id="kullaniciAdi" name="kullaniciAdi" required>
      </div>
      <div class="form-group">
        <label for="eposta">E-posta</label>
        <input type="email" id="eposta" name="eposta" required>
      </div>
      <div class="form-group">
        <label for="sifre">Şifre</label>
        <input type="password" id="sifre" name="sifre" required>
      </div>
      <button type="submit">Kayıt Ol</button>
    </form>
    <a href="/giris.html">Giriş Yap</a> 
  </div> 
</body>
</html>
